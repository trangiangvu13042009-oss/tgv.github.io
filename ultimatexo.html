<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="docTitle">Ultimate Tic Tac Toe</title>
    <style>
        /* ================= THIẾT LẬP GIAO DIỆN TỐI (ĐỒNG BỘ GAME HUB) ================= */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
            --border-color: #2c3e50;
            --x-color: #ff4d4d;
            --o-color: #3498db;
            --highlight-glow: 0 0 10px rgba(241, 196, 15, 0.8), 0 0 0 3px #f1c40f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ================= THANH ĐIỀU HƯỚNG (HEADER) ================= */
        header {
            background-color: #1a1a1a;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            width: 100%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span { color: var(--accent-color); }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        .lang-btn {
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid #f1c40f;
            background-color: transparent;
            color: #f1c40f;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn:hover {
            background-color: #f1c40f;
            color: #121212;
        }

        /* ================= BỐ CỤC GAME CHÍNH ================= */
        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: 10px;
            text-align: center;
        }

        .top-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .mode-selection {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 2px solid var(--accent-color);
            background-color: transparent;
            color: var(--accent-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        .status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
            color: #b0b0b0;
            height: 30px;
            text-align: center;
        }

        /* Hiệu ứng nhấp nháy khi Bot đang nghĩ */
        .thinking { color: #f1c40f; font-style: italic; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* ================= BÀN CỜ ULTIMATE ================= */
        .ultimate-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background-color: var(--border-color); 
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: opacity 0.3s;
        }

        /* Khóa hover nhẹ khi máy đang nghĩ */
        .ultimate-board.disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        .small-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            background-color: var(--border-color);
            border-radius: 8px;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Highlight bảng đang được phép đánh */
        .small-board.active-board {
            box-shadow: var(--highlight-glow);
            transform: scale(1.02);
            z-index: 10;
            background-color: #34495e;
        }

        /* Lớp phủ kết quả bảng nhỏ */
        .board-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: bold;
            background-color: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(2px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            border-radius: 8px;
        }

        .small-board.won-X .board-overlay { opacity: 1; color: var(--x-color); text-shadow: 0 0 10px var(--x-color); }
        .small-board.won-O .board-overlay { opacity: 1; color: var(--o-color); text-shadow: 0 0 10px var(--o-color); }
        .small-board.drawn .board-overlay { opacity: 1; color: #7f8c8d; font-size: 3rem; }

        .cell {
            width: 45px; height: 45px;
            background-color: #1e1e1e;
            border: none;
            border-radius: 4px;
            font-size: 1.8rem;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        @media (max-width: 600px) {
            .cell { width: 32px; height: 32px; font-size: 1.2rem; }
        }

        .cell:hover:not(.disabled) { background-color: #2a2a2a; transform: scale(1.05); }
        .cell.disabled { cursor: not-allowed; opacity: 0.5; }
        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }

        .controls {
            margin-top: 25px;
            margin-bottom: 35px;
        }
        .btn {
            padding: 10px 20px; font-size: 1rem; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s;
        }
        .reset-btn { background-color: #2ecc71; color: white; }
        .reset-btn:hover { background-color: #27ae60; }

        /* ================= KHU VỰC LUẬT CHƠI (MỚI THÊM) ================= */
        .rules-card {
            max-width: 530px;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .rules-card h2 {
            font-size: 1.25rem;
            color: #ffffff;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .rules-card ul {
            list-style-type: none;
        }

        .rules-card li {
            font-size: 0.92rem;
            color: #b8b8b8;
            margin-bottom: 12px;
            line-height: 1.5;
            position: relative;
            padding-left: 22px;
        }

        .rules-card li::before {
            content: "⚡";
            position: absolute;
            left: 0;
            top: 1px;
            color: #f1c40f;
            font-size: 0.9rem;
        }

        .rules-card li strong {
            color: #ffffff;
        }

        /* ================= MODAL HIỆU ỨNG KẾT THÚC ================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; align-items: center; justify-content: center;
            z-index: 2000; backdrop-filter: blur(8px);
        }
        .modal-content {
            padding: 40px 30px; border-radius: 15px; text-align: center; max-width: 90%; width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes zoomIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-emoji { font-size: 5rem; margin-bottom: 20px; }
        .modal-text { font-size: 1.8rem; font-weight: bold; margin-bottom: 30px; line-height: 1.4; }

        .modal-overlay.win-effect { background: radial-gradient(circle, rgba(46, 204, 113, 0.45) 0%, rgba(18, 18, 18, 0.95) 80%); }
        .modal-overlay.win-effect .modal-content { background-color: #1e1e1e; border: 3px solid #2ecc71; box-shadow: 0 0 30px rgba(46, 204, 113, 0.5); }
        .modal-overlay.win-effect .modal-text { color: #2ecc71; }
        
        .modal-overlay.lose-effect { background: radial-gradient(circle, rgba(231, 76, 60, 0.45) 0%, rgba(18, 18, 18, 0.95) 80%); }
        .modal-overlay.lose-effect .modal-content { background-color: #1a0f0f; border: 3px solid #e74c3c; box-shadow: 0 0 30px rgba(231, 76, 60, 0.5); }
        .modal-overlay.lose-effect .modal-text { color: #e74c3c; }

        .modal-overlay.draw-effect { background: radial-gradient(circle, rgba(155, 89, 182, 0.45) 0%, rgba(18, 18, 18, 0.95) 80%); }
        .modal-overlay.draw-effect .modal-content { background-color: #1b1622; border: 3px solid #9b59b6; box-shadow: 0 0 30px rgba(155, 89, 182, 0.5); }
        .modal-overlay.draw-effect .modal-text { color: #9b59b6; }

        footer {
            background-color: #1a1a1a; border-top: 1px solid var(--border-color); padding: 20px; text-align: center; font-size: 0.9rem; color: #666; width: 100%; margin-top: auto;
        }
    </style>
</head>
<body>

    <!-- ================= HEADER ĐỒNG BỘ GAME HUB ================= -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">🎮 My<span>GameHub</span></a>
            <div class="nav-controls">
                <nav>
                    <ul class="nav-links">
                        <li><a href="index.html#about" id="nav-about">Giới thiệu</a></li>
                        <li><a href="index.html#games" id="nav-games" class="active">Kho Game</a></li>
                    </ul>
                </nav>
                <button class="lang-btn" id="langToggle" onclick="toggleLanguage()">🌐 English</button>
            </div>
        </div>
    </header>

    <!-- Khu vực hiển thị nội dung chính -->
    <main>
        <h1 id="gameTitle">Ultimate Tic-Tac-Toe</h1>

        <div class="top-controls">
            <div class="mode-selection">
                <button class="mode-btn active" id="pvpBtn" onclick="setMode('pvp')">👥 Chơi 2 người</button>
                <button class="mode-btn" id="pveBtn" onclick="setMode('pve')">🤖 Đấu với Máy</button>
            </div>
        </div>

        <div class="status" id="status">Lượt của X (Bạn)</div>

        <div class="ultimate-board" id="ultimateBoard">
            <!-- Render bằng JavaScript -->
        </div>

        <div class="controls">
            <button class="btn reset-btn" id="resetBtn" onclick="resetGame()">Chơi lại 🔄</button>
        </div>

        <!-- Thẻ hiển thị Luật chơi được cập nhật động bằng JS -->
        <div class="rules-card">
            <h2 id="rulesTitle">📖 Luật Chơi Tóm Tắt</h2>
            <ul id="rulesList">
                <!-- Nội dung luật chơi tự động tải theo ngôn ngữ -->
            </ul>
        </div>
    </main>

    <!-- Modal Kết Thúc -->
    <div class="modal-overlay" id="endGameModal">
        <div class="modal-content">
            <div class="modal-emoji" id="modalEmoji">🎉</div>
            <div class="modal-text" id="modalText">Bạn đã chiến thắng!</div>
            <button class="btn reset-btn" id="modalResetBtn" onclick="closeModalAndReset()">Chơi lại 🔄</button>
        </div>
    </div>

    <!-- Footer đồng bộ -->
    <footer>
        <p id="footerText">© 2026 My Game Hub. Được thiết kế bởi một Developer tràn đầy nhiệt huyết.</p>
    </footer>

<script>
    /* ================= LOGIC GAME ULTIMATE TIC-TAC-TOE ================= */
    const ultimateBoardEl = document.getElementById('ultimateBoard');
    const statusText = document.getElementById('status');
    const pvpBtn = document.getElementById('pvpBtn');
    const pveBtn = document.getElementById('pveBtn');
    const langToggle = document.getElementById('langToggle');
    const gameTitle = document.getElementById('gameTitle');
    const resetBtn = document.getElementById('resetBtn');

    const linkAbout = document.getElementById('nav-about');
    const linkGames = document.getElementById('nav-games');
    const footerText = document.getElementById('footerText');

    const endGameModal = document.getElementById('endGameModal');
    const modalEmoji = document.getElementById('modalEmoji');
    const modalText = document.getElementById('modalText');
    const modalResetBtn = document.getElementById('modalResetBtn');

    let gameMode = 'pvp'; 
    let currentPlayer = 'X'; 
    let gameActive = true;
    let isBotThinking = false;
    let currentLang = 'vi'; 

    let smallBoardsData = Array(9).fill(null).map(() => Array(9).fill(""));
    let bigBoardData = Array(9).fill(null);
    let activeBoardIndex = -1;

    const WIN_COMBOS = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]
    ];

    const translations = {
        vi: {
            docTitle: "Ultimate Tic-Tac-Toe",
            navAbout: "Giới thiệu",
            navGames: "Kho Game",
            langBtn: "🌐 English",
            pvp: "👥 Chơi 2 người",
            pve: "🤖 Đấu với Máy",
            reset: "Chơi lại 🔄",
            // Thêm thẻ màu sắc vào phần dịch tiếng Việt
            turnX: 'Lượt của <span style="color: var(--x-color);">X</span>',
            turnXYou: 'Lượt của <span style="color: var(--x-color);">X</span> (Bạn)',
            turnO: 'Lượt của <span style="color: var(--o-color);">O</span>',
            botThinking: "Máy đang tính toán... 💭",
            win: "Người chơi {player} đã CHIẾN THẮNG! 🎉",
            botWin: "Máy đã thắng! Thử lại nhé 🤖",
            draw: "Trò chơi HÒA! 🤝",
            modalReset: "Chơi lại 🔄",
            footerText: "© 2026 My Game Hub. Được thiết kế bởi một Developer tràn đầy nhiệt huyết.",
            
            // Dịch luật chơi (Tiếng Việt)
            rulesTitle: "📖 Luật Chơi Siêu Cấp",
            rule1: "Bàn cờ lớn gồm <strong>9 bàn cờ nhỏ 3x3</strong> bên trong.",
            rule2: "<strong>Quy luật ép buộc:</strong> Nước đi của bạn trong ô nhỏ sẽ chỉ định chính xác bàn cờ nhỏ tiếp theo đối thủ bắt buộc phải đánh (Ví dụ: Đánh vào ô góc trên bên phải, đối thủ phải đi ở bàn cờ nằm ở góc trên bên phải).",
            rule3: "Thắng một bàn cờ nhỏ bằng cách tạo hàng 3 ký tự (ngang/dọc/chéo) để chiếm trọn bàn cờ đó.",
            rule4: "<strong>Nước đi tự do:</strong> Nếu bị gửi đến một bàn cờ nhỏ đã kết thúc (đã thắng hoặc hòa), bạn được quyền đánh ở <strong>bất kỳ ô trống nào</strong> trên toàn bộ bàn cờ lớn.",
            rule5: "<strong>Chiến thắng chung cuộc:</strong> Người đầu tiên chiếm được 3 bàn cờ nhỏ tạo thành một hàng thẳng sẽ thắng trận đấu!"
        },
        en: {
            docTitle: "Ultimate Tic-Tac-Toe",
            navAbout: "About Me",
            navGames: "Games",
            langBtn: "🌐 Tiếng Việt",
            pvp: "👥 2 Players",
            pve: "🤖 Vs Computer",
            reset: "Reset Game 🔄",
            // Đảo vị trí thẻ màu lên trước chữ 's Turn cho đúng ngữ pháp tiếng Anh
            turnX: '<span style="color: var(--x-color);">X</span>\'s Turn',
            turnXYou: '<span style="color: var(--x-color);">X</span>\'s Turn (You)',
            turnO: '<span style="color: var(--o-color);">O</span>\'s Turn',
            botThinking: "Computer thinking... 💭",
            win: "Player {player} WINS! 🎉",
            botWin: "Computer wins! AI is tough 🤖",
            draw: "It's a DRAW! 🤝",
            modalReset: "Play Again 🔄",
            footerText: "© 2026 My Game Hub. Crafted by a passionate developer.",
            
            // Dịch luật chơi (Tiếng Anh)
            rulesTitle: "📖 Ultimate Rules",
            rule1: "The big board contains <strong>9 smaller 3x3 mini-boards</strong>.",
            rule2: "<strong>The Target Mechanic:</strong> Your move in a mini-board dictates which mini-board your opponent must play in next (e.g., placing in the top-right cell forces them to play in the top-right mini-board).",
            rule3: "Win a mini-board by getting 3-in-a-row to claim that section.",
            rule4: "<strong>Free Move:</strong> If you are sent to a mini-board that is already won or full, you get a 'Free Move' to play in <strong>any available cell</strong> across the entire board.",
            rule5: "<strong>Global Win:</strong> Align 3 won mini-boards in a row (row, column, or diagonal) to win the whole game!"
        }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'vi' ? 'en' : 'vi';
        updateLanguageUI();
    }

    function updateLanguageUI() {
        const t = translations[currentLang];
        document.getElementById('docTitle').textContent = t.docTitle;
        linkAbout.textContent = t.navAbout;
        linkGames.textContent = t.navGames;
        langToggle.textContent = t.langBtn;
        gameTitle.textContent = t.docTitle;
        pvpBtn.textContent = t.pvp;
        pveBtn.textContent = t.pve;
        resetBtn.textContent = t.reset;
        modalResetBtn.textContent = t.modalReset;
        footerText.textContent = t.footerText;
        
        // Cập nhật nội dung luật chơi tự động
        document.getElementById('rulesTitle').textContent = t.rulesTitle;
        document.getElementById('rulesList').innerHTML = `
            <li>${t.rule1}</li>
            <li>${t.rule2}</li>
            <li>${t.rule3}</li>
            <li>${t.rule4}</li>
            <li>${t.rule5}</li>
        `;
        
        updateStatusDisplay();
    }

    function updateStatusDisplay(endStatus = null) {
        if (endStatus) {
            statusText.textContent = endStatus;
            return;
        }
        if (!gameActive) return;
        if (isBotThinking) {
            statusText.innerHTML = `<span class="thinking">${translations[currentLang].botThinking}</span>`;
            return;
        }

        // LẤY DỮ LIỆU ĐÃ DỊCH THEO NGÔN NGỮ HIỆN TẠI
        const t = translations[currentLang];
        if (currentPlayer === 'X') {
            statusText.innerHTML = (gameMode === 'pve') ? t.turnXYou : t.turnX;
        } else {
            statusText.innerHTML = t.turnO;
        }
    }

    function setMode(mode) {
        gameMode = mode;
        if (mode === 'pvp') {
            pvpBtn.classList.add('active');
            pveBtn.classList.remove('active');
        } else {
            pveBtn.classList.add('active');
            pvpBtn.classList.remove('active');
        }
        resetGame();
    }

    // --- Khởi tạo lưới 9x9 ---
    function initBoard() {
        ultimateBoardEl.innerHTML = '';
        for (let b = 0; b < 9; b++) {
            const smallBoardEl = document.createElement('div');
            smallBoardEl.className = 'small-board';
            smallBoardEl.id = `board-${b}`;

            const overlay = document.createElement('div');
            overlay.className = 'board-overlay';
            overlay.id = `overlay-${b}`;
            smallBoardEl.appendChild(overlay);

            for (let c = 0; c < 9; c++) {
                const cell = document.createElement('button');
                cell.className = 'cell';
                cell.id = `cell-${b}-${c}`;
                cell.onclick = () => onCellClicked(b, c);
                smallBoardEl.appendChild(cell);
            }
            ultimateBoardEl.appendChild(smallBoardEl);
        }
        updateUI();
    }

    function onCellClicked(b, c) {
        if (!gameActive || isBotThinking) return;
        if (gameMode === 'pve' && currentPlayer === 'O') return; 

        if (isValidMove(b, c, activeBoardIndex, smallBoardsData, bigBoardData)) {
            executeMove(b, c);
        }
    }

    function isValidMove(b, c, activeIdx, smallB, bigB) {
        if (activeIdx !== -1 && activeIdx !== b) return false;
        if (bigB[b] !== null) return false;
        if (smallB[b][c] !== "") return false;
        return true;
    }

    function executeMove(b, c) {
        smallBoardsData[b][c] = currentPlayer;
        
        let boardWon = checkLineWin(smallBoardsData[b]);
        if (boardWon) {
            bigBoardData[b] = currentPlayer;
        } else if (!smallBoardsData[b].includes("")) {
            bigBoardData[b] = 'D'; 
        }

        activeBoardIndex = (bigBoardData[c] !== null) ? -1 : c;

        let gameWinner = checkLineWin(bigBoardData);
        if (gameWinner || !bigBoardData.includes(null)) {
            gameActive = false;
            updateUI();
            
            let endMsg = "";
            let effectType = "win";

            if (gameWinner) {
                if (gameMode === 'pve' && currentPlayer === 'O') {
                    endMsg = translations[currentLang].botWin;
                    effectType = "lose"; 
                } else {
                    endMsg = translations[currentLang].win.replace("{player}", currentPlayer);
                }
            } else {
                endMsg = translations[currentLang].draw;
                effectType = "draw";
            }

            updateStatusDisplay(endMsg);
            setTimeout(() => triggerEndGameEffect(effectType, endMsg), 600);
            return;
        }

        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        updateStatusDisplay();
        updateUI();

        // Kích hoạt Bot nếu đến lượt
        if (gameMode === 'pve' && currentPlayer === 'O' && gameActive) {
            isBotThinking = true;
            ultimateBoardEl.classList.add('disabled'); // Khóa hiệu ứng hover
            updateStatusDisplay();
            
            // TĂNG THỜI GIAN DELAY LÊN 800ms ĐỂ BOT ĐI CHẬM LẠI
            setTimeout(makeBotMove, 800); 
        }
    }

    function checkLineWin(boardArray) {
        for (let combo of WIN_COMBOS) {
            const [x, y, z] = combo;
            if (boardArray[x] && boardArray[x] !== 'D' && 
                boardArray[x] === boardArray[y] && 
                boardArray[x] === boardArray[z]) {
                return boardArray[x];
            }
        }
        return null;
    }

    // --- AI MINIMAX ---
    function makeBotMove() {
        const depth = 4;
        let bestScore = -Infinity;
        let bestMove = null;
        let legalMoves = getLegalMoves(activeBoardIndex, smallBoardsData, bigBoardData);

        legalMoves.sort(() => Math.random() - 0.5);

        for (let move of legalMoves) {
            let state = cloneState(smallBoardsData, bigBoardData, activeBoardIndex);
            applySimulatedMove(state, move.b, move.c, 'O');
            let score = minimax(state, depth - 1, -Infinity, Infinity, false);
            if (score > bestScore) {
                bestScore = score;
                bestMove = move;
            }
        }

        isBotThinking = false;
        ultimateBoardEl.classList.remove('disabled');
        if (bestMove) executeMove(bestMove.b, bestMove.c);
    }

    function minimax(state, depth, alpha, beta, isMaximizing) {
        let winner = checkLineWin(state.big);
        if (winner === 'O') return 1000 + depth; 
        if (winner === 'X') return -1000 - depth; 
        if (depth === 0) return evaluateState(state);

        let moves = getLegalMoves(state.active, state.small, state.big);
        if (moves.length === 0) return 0; 

        if (isMaximizing) {
            let maxEval = -Infinity;
            for (let move of moves) {
                let nextState = cloneState(state.small, state.big, state.active);
                applySimulatedMove(nextState, move.b, move.c, 'O');
                let ev = minimax(nextState, depth - 1, alpha, beta, false);
                maxEval = Math.max(maxEval, ev);
                alpha = Math.max(alpha, ev);
                if (beta <= alpha) break; 
            }
            return maxEval;
        } else {
            let minEval = Infinity;
            for (let move of moves) {
                let nextState = cloneState(state.small, state.big, state.active);
                applySimulatedMove(nextState, move.b, move.c, 'X');
                let ev = minimax(nextState, depth - 1, alpha, beta, true);
                minEval = Math.min(minEval, ev);
                beta = Math.min(beta, ev);
                if (beta <= alpha) break; 
            }
            return minEval;
        }
    }

    function getLegalMoves(activeIdx, smallB, bigB) {
        let moves = [];
        if (activeIdx === -1 || bigB[activeIdx] !== null) {
            for (let b = 0; b < 9; b++) {
                if (bigB[b] === null) {
                    for (let c = 0; c < 9; c++) {
                        if (smallB[b][c] === "") moves.push({b, c});
                    }
                }
            }
        } else {
            for (let c = 0; c < 9; c++) {
                if (smallB[activeIdx][c] === "") moves.push({b: activeIdx, c});
            }
        }
        return moves;
    }

    function applySimulatedMove(state, b, c, player) {
        state.small[b][c] = player;
        let boardWon = checkLineWin(state.small[b]);
        if (boardWon) {
            state.big[b] = player;
        } else if (!state.small[b].includes("")) {
            state.big[b] = 'D';
        }
        state.active = (state.big[c] !== null) ? -1 : c;
    }

    function evaluateState(state) {
        let score = 0;
        for (let i = 0; i < 9; i++) {
            if (state.big[i] === 'O') score += 10;
            else if (state.big[i] === 'X') score -= 10;
        }
        return score;
    }

    function cloneState(smallB, bigB, activeIdx) {
        return {
            small: smallB.map(board => [...board]),
            big: [...bigB],
            active: activeIdx
        };
    }

    // --- RENDER GIAO DIỆN ---
    function updateUI() {
        for (let b = 0; b < 9; b++) {
            const boardEl = document.getElementById(`board-${b}`);
            const overlay = document.getElementById(`overlay-${b}`);
            
            boardEl.classList.remove('active-board', 'won-X', 'won-O', 'drawn');

            if (bigBoardData[b] === 'X') {
                boardEl.classList.add('won-X'); overlay.textContent = 'X';
            } else if (bigBoardData[b] === 'O') {
                boardEl.classList.add('won-O'); overlay.textContent = 'O';
            } else if (bigBoardData[b] === 'D') {
                boardEl.classList.add('drawn'); overlay.textContent = '-';
            }

            if (gameActive && !isBotThinking) {
                if ((activeBoardIndex === -1 || activeBoardIndex === b) && bigBoardData[b] === null) {
                    boardEl.classList.add('active-board');
                }
            }

            for (let c = 0; c < 9; c++) {
                const cell = document.getElementById(`cell-${b}-${c}`);
                const val = smallBoardsData[b][c];
                
                cell.textContent = val;
                cell.className = 'cell';
                if (val === 'X') cell.classList.add('x');
                if (val === 'O') cell.classList.add('o');

                const isBoardActive = (activeBoardIndex === -1 || activeBoardIndex === b) && bigBoardData[b] === null;
                if (!isBoardActive || val !== "" || !gameActive || isBotThinking) {
                    cell.classList.add('disabled');
                }
            }
        }
    }

    function triggerEndGameEffect(type, message) {
        endGameModal.className = `modal-overlay ${type}-effect`;
        modalText.textContent = message;
        if (type === 'win') modalEmoji.textContent = "🏆";
        else if (type === 'lose') modalEmoji.textContent = "👾";
        else modalEmoji.textContent = "🤝";
        endGameModal.style.display = 'flex';
    }

    function closeModalAndReset() {
        endGameModal.style.display = 'none';
        resetGame();
    }

    function resetGame() {
        currentPlayer = 'X';
        gameActive = true;
        isBotThinking = false;
        activeBoardIndex = -1;
        smallBoardsData = Array(9).fill(null).map(() => Array(9).fill(""));
        bigBoardData = Array(9).fill(null);
        ultimateBoardEl.classList.remove('disabled');
        updateStatusDisplay();
        initBoard();
    }

    updateLanguageUI();
    initBoard();
</script>
